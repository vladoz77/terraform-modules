name: terraform

on:
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  fmt:
    name: terraform fmt (check)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        
      - name: Terraform fmt (recursive)
        run: |
          set -euo pipefail
          terraform fmt -check -recursive terraform

